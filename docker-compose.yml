services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: market
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d market"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/market
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  dashboard:
    build: .
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/market
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"

volumes:
  pgdata:
