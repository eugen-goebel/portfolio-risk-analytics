name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check with mypy
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests with coverage
        run: uv run pytest -v --cov=analytics --cov=api --cov=db --cov=ingestion --cov-report=term-missing --cov-report=xml --cov-fail-under=85

      - name: Coverage summary
        if: always() && matrix.python-version == '3.13'
        run: |
          echo "### Coverage" >> "$GITHUB_STEP_SUMMARY"
          uv run python -c "import xml.etree.ElementTree as ET; print(f\"Line coverage: {float(ET.parse('coverage.xml').getroot().get('line-rate'))*100:.1f}%\")" >> "$GITHUB_STEP_SUMMARY"

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: market_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked

      - name: Run the suite against PostgreSQL
        env:
          TEST_DATABASE_URL: postgresql+psycopg2://app:app@localhost:5432/market_test
        run: uv run pytest -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build and start the stack
        run: docker compose up -d --build

      - name: Wait for the API
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8000/ >/dev/null; then echo "API is up"; exit 0; fi
            sleep 3
          done
          echo "API did not become healthy"
          docker compose logs
          exit 1

      - name: Seed demo data through the API container
        run: docker compose exec -T api python main.py ingest --demo demo-a demo-b

      - name: Verify the data is served
        run: curl -fsS http://localhost:8000/assets | grep -q "demo-a"

      - name: Check the dashboard health endpoint
        run: curl -fsS http://localhost:8501/_stcore/health

      - name: Tear down
        if: always()
        run: docker compose down -v
